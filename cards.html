<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Explorer Cards — Yoyo's World</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#110904;--gold:#F0C040;--sand:#D4A96A;--terra:#C1440E;--text:#F5ECD7;--dim:#A89070;--purple:#7B68EE;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── HEADER ── */
.page-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(212,169,106,.15);}
.hdr-left{display:flex;align-items:center;gap:14px;}
.hdr-back{color:var(--dim);font-size:.85rem;text-decoration:none;transition:color .2s;}
.hdr-back:hover{color:var(--gold);}
.hdr-title{font-family:'Cinzel',serif;color:var(--gold);font-size:1.15rem;}
.hdr-count{color:var(--dim);font-size:.78rem;margin-top:2px;}
.hdr-badge{background:rgba(240,192,64,.12);border:1px solid rgba(240,192,64,.3);border-radius:50px;padding:4px 14px;font-size:.78rem;color:var(--sand);}

/* ── PROGRESS BAR ── */
.progress-wrap{padding:14px 20px 0;}
.progress-label{display:flex;justify-content:space-between;margin-bottom:6px;}
.progress-label span{font-size:.76rem;color:var(--dim);}
.progress-bar{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--terra));border-radius:3px;transition:width .6s ease;}

/* ── GRID ── */
main{padding:20px;max-width:720px;margin:0 auto;}
.section-label{font-family:'Cinzel',serif;color:var(--sand);font-size:.78rem;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:16px;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:32px;}

/* ── CARD THUMBNAIL ── */
.card-thumb-outer{
  background:linear-gradient(135deg,#ffd700,#ff9ecd,#c084fc,#60d0ff,#ffd700);
  background-size:250% 250%;
  animation:borderAnim 4s ease infinite;
  border-radius:18px;padding:2.5px;cursor:pointer;
  transition:transform .2s,box-shadow .2s;
}
@keyframes borderAnim{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.card-thumb-outer:hover{transform:translateY(-4px);box-shadow:0 10px 30px rgba(192,132,252,.35);}
.card-thumb{
  background:linear-gradient(160deg,#12094a,#2d0e6b,#56106a);
  border-radius:15.5px;padding:15px 14px;
  min-height:140px;display:flex;flex-direction:column;justify-content:space-between;
  position:relative;overflow:hidden;
}
.card-thumb::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:radial-gradient(circle,rgba(255,255,255,.1) 1px,transparent 1px);
  background-size:16px 16px;
}
.thumb-level{font-size:.65rem;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:6px;position:relative;z-index:1;}
.thumb-title{
  font-family:'Cinzel',serif;font-size:.84rem;line-height:1.35;margin-bottom:auto;position:relative;z-index:1;
  background:linear-gradient(135deg,#FFD700,#FFECB3);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.thumb-footer{margin-top:10px;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1;}
.thumb-score{font-size:.78rem;letter-spacing:.5px;}
.thumb-date{font-size:.65rem;color:rgba(255,255,255,.35);}

/* ── LOCKED SLOT ── */
.card-locked{
  background:rgba(255,255,255,.03);border:2px dashed rgba(255,255,255,.08);
  border-radius:14px;min-height:140px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:6px;
}
.locked-icon{font-size:1.6rem;opacity:.35;}
.locked-label{font-size:.72rem;color:var(--dim);opacity:.5;text-align:center;line-height:1.4;padding:0 10px;}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:60px 24px;}
.empty-icon{font-size:3rem;margin-bottom:14px;}
.empty-title{font-family:'Cinzel',serif;color:var(--gold);font-size:1.2rem;margin-bottom:10px;}
.empty-sub{color:var(--dim);font-size:.88rem;line-height:1.65;max-width:320px;margin:0 auto 24px;}
.btn-go{background:linear-gradient(135deg,var(--gold),var(--terra));border:none;border-radius:50px;padding:11px 28px;color:white;font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;cursor:pointer;text-decoration:none;display:inline-block;transition:transform .2s;}
.btn-go:hover{transform:translateY(-2px);}

/* ── MODAL ── */
#modal-overlay{position:fixed;inset:0;z-index:50;display:none;justify-content:center;align-items:center;background:rgba(6,3,1,.85);backdrop-filter:blur(6px);}
#modal-overlay.active{display:flex;}
#modal-wrap{width:93%;max-width:420px;max-height:90vh;overflow-y:auto;animation:cardUp .3s ease;}
@keyframes cardUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.cert-outer{
  background:linear-gradient(135deg,#ffd700,#ff9ecd,#c084fc,#60d0ff,#ffd700);
  background-size:300% 300%;
  animation:borderAnim2 4s ease infinite;
  border-radius:26px;padding:3px;
}
@keyframes borderAnim2{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.cert-card{
  background:linear-gradient(160deg,#12094a 0%,#2d0e6b 30%,#56106a 60%,#8c1a4a 100%);
  border-radius:23px;padding:26px 20px 22px;text-align:center;position:relative;overflow:hidden;
}
.cert-dots{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(circle,rgba(255,255,255,.12) 1px,transparent 1px);background-size:18px 18px;}
.cert-card::before{content:'✨';position:absolute;top:10px;left:12px;font-size:1rem;opacity:.7;animation:twinkle2 2.2s ease-in-out infinite;}
.cert-card::after {content:'✨';position:absolute;top:10px;right:12px;font-size:1rem;opacity:.7;animation:twinkle2 2.2s ease-in-out infinite .6s;}
@keyframes twinkle2{0%,100%{opacity:.35;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}
.cert-yoyo-wrap{width:86px;height:86px;border-radius:50%;background:linear-gradient(135deg,#ff9ecd,#ffc107,#ff6b6b);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;position:relative;z-index:1;box-shadow:0 0 22px rgba(255,193,7,.55),0 0 50px rgba(255,158,205,.3);}
.cert-title{font-family:'Cinzel',serif;font-size:1.15rem;font-weight:700;margin-bottom:11px;line-height:1.38;position:relative;z-index:1;background:linear-gradient(135deg,#FFD700,#FFECB3,#FFD700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.cert-desc{color:rgba(255,255,255,.82);font-size:.87rem;line-height:1.68;font-style:italic;margin-bottom:14px;padding:0 4px;position:relative;z-index:1;}
.cert-facts{display:flex;flex-direction:column;gap:7px;margin-bottom:13px;position:relative;z-index:1;}
.cert-fact{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:10px;padding:8px 12px;color:rgba(255,255,255,.9);font-size:.82rem;line-height:1.45;text-align:left;}
.cert-funfact{background:linear-gradient(135deg,rgba(255,214,0,.18),rgba(255,154,0,.14));border:1px solid rgba(255,200,50,.4);border-radius:12px;padding:11px 14px;margin-bottom:13px;text-align:left;position:relative;z-index:1;}
.cert-funfact-label{color:#FFD700;font-size:.7rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.cert-funfact-text{color:rgba(255,255,255,.85);font-size:.83rem;line-height:1.55;}
.cert-bottom{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;padding-top:11px;border-top:1px solid rgba(255,255,255,.12);}
.cert-score-stars{font-size:1.05rem;letter-spacing:1px;}
.cert-meta-right{color:rgba(255,255,255,.4);font-size:.7rem;text-align:right;line-height:1.55;}

.modal-actions{display:flex;flex-direction:column;gap:8px;margin-top:16px;}
.btn-close{background:transparent;border:2px solid rgba(212,169,106,.3);border-radius:50px;padding:10px 24px;color:var(--dim);font-family:'Nunito',sans-serif;font-size:.88rem;cursor:pointer;transition:color .2s,border-color .2s;width:100%;}
.btn-close:hover{color:var(--gold);border-color:var(--gold);}
.btn-screenshot{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:50px;padding:9px 20px;color:var(--dim);font-family:'Nunito',sans-serif;font-size:.8rem;cursor:default;text-align:center;width:100%;}
</style>
</head>
<body>

<div class="page-header">
  <div class="hdr-left">
    <a class="hdr-back" href="index.html">← Back</a>
    <div>
      <div class="hdr-title">🎴 My Explorer Cards</div>
      <div class="hdr-count" id="hdr-count">Loading...</div>
    </div>
  </div>
  <div class="hdr-badge" id="hdr-badge">0 collected</div>
</div>

<div class="progress-wrap" id="progress-wrap" style="display:none">
  <div class="progress-label">
    <span>Collection Progress</span>
    <span id="progress-text">0 / 2</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>

<main id="main-content"></main>

<!-- CARD MODAL -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal-wrap">
    <div class="cert-card" id="modal-card"></div>
    <div class="modal-actions">
      <div class="btn-screenshot">📸 Screenshot to save this card!</div>
      <button class="btn-close" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
// Known levels — expand as new levels are added
const ALL_LEVELS = [
  { level:'mesopotamia', display:'Mesopotamia · Level 1', icon:'🏛️' },
  { level:'china',       display:'Ancient China · Level 2', icon:'🐉' },
];

const cards = JSON.parse(localStorage.getItem('yoyo_cards') || '[]');

// ── RENDER ──
function render(){
  const main = document.getElementById('main-content');
  const total = ALL_LEVELS.length;
  const earned = cards.length;

  // Header counts
  document.getElementById('hdr-count').textContent =
    earned === 0 ? 'No cards yet' : `${earned} card${earned>1?'s':''} collected`;
  document.getElementById('hdr-badge').textContent = `${earned} / ${total}`;

  if(earned > 0){
    const pw = document.getElementById('progress-wrap');
    pw.style.display = 'block';
    document.getElementById('progress-text').textContent = `${earned} / ${total}`;
    document.getElementById('progress-fill').style.width = `${(earned/total)*100}%`;
  }

  if(earned === 0){
    main.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🗺️</div>
        <div class="empty-title">No cards yet!</div>
        <p class="empty-sub">Complete a quiz after exploring a civilization to earn your first explorer card.</p>
        <a class="btn-go" href="mesopotamia/index.html">Start Exploring →</a>
      </div>`;
    return;
  }

  // Group cards by level (keep last card per level if multiple attempts)
  const cardsByLevel = {};
  cards.forEach(c => { cardsByLevel[c.level] = c; });

  let html = `<p class="section-label">Your Collection</p><div class="cards-grid">`;

  ALL_LEVELS.forEach(lv => {
    const card = cardsByLevel[lv.level];
    if(card){
      const stars = '⭐'.repeat(card.score) + '☆'.repeat(card.total - card.score);
      html += `<div class="card-thumb-outer" onclick="openCard('${lv.level}')">
        <div class="card-thumb">
          <div class="thumb-level">${lv.icon} ${lv.display}</div>
          <div class="thumb-title">${card.title}</div>
          <div class="thumb-footer">
            <span class="thumb-score">${stars}</span>
            <span class="thumb-date">${card.date}</span>
          </div>
        </div>
      </div>`;
    } else {
      html += `<div class="card-locked">
        <div class="locked-icon">🔒</div>
        <div class="locked-label">${lv.display}<br>Complete the quiz to unlock</div>
      </div>`;
    }
  });

  html += '</div>';
  main.innerHTML = html;
}

// ── OPEN MODAL ──
function openCard(level){
  const card = [...cards].reverse().find(c => c.level === level);
  if(!card) return;

  const stars = '⭐'.repeat(card.score) + '☆'.repeat(card.total - card.score);
  const factsHtml = (card.key_facts || []).map(f => `<div class="cert-fact">${f}</div>`).join('');
  const yoyoSvg = `<svg width="56" height="72" viewBox="0 0 70 92">
    <defs><clipPath id="sc-c"><rect x="21" y="36" width="28" height="24" rx="8"/></clipPath></defs>
    <rect x="37" y="32" width="12" height="16" rx="3.5" fill="#7a3b10" opacity=".85"/>
    <rect x="21" y="36" width="28" height="24" rx="8" fill="#ff85c0"/>
    <g clip-path="url(#sc-c)"><rect x="0" y="36" width="70" height="4" fill="#111"/><rect x="0" y="44" width="70" height="4" fill="#111"/><rect x="0" y="52" width="70" height="4" fill="#111"/></g>
    <line x1="21" y1="40" x2="8" y2="52" stroke="#ff85c0" stroke-width="6" stroke-linecap="round"/>
    <line x1="49" y1="40" x2="62" y2="52" stroke="#ff85c0" stroke-width="6" stroke-linecap="round"/>
    <ellipse cx="15" cy="32" rx="8" ry="18" fill="#2d1a06"/><ellipse cx="55" cy="32" rx="8" ry="18" fill="#2d1a06"/>
    <circle cx="35" cy="24" r="16" fill="#ffbe80"/>
    <path d="M19 19 L51 19 Q51 6 35 6 Q19 6 19 19Z" fill="#2d1a06"/>
    <rect x="23" y="21.5" width="9.5" height="7" rx="2" fill="none" stroke="#3a3a3a" stroke-width="1.8"/>
    <rect x="37" y="21.5" width="9.5" height="7" rx="2" fill="none" stroke="#3a3a3a" stroke-width="1.8"/>
    <line x1="32.5" y1="25" x2="37" y2="25" stroke="#3a3a3a" stroke-width="1.5"/>
    <line x1="23" y1="25" x2="19.5" y2="27" stroke="#3a3a3a" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="46.5" y1="25" x2="50" y2="27" stroke="#3a3a3a" stroke-width="1.4" stroke-linecap="round"/>
    <circle cx="27.75" cy="25" r="2.3" fill="#3d2206"/><circle cx="41.75" cy="25" r="2.3" fill="#3d2206"/>
    <circle cx="28.8" cy="24" r="1" fill="white"/><circle cx="42.8" cy="24" r="1" fill="white"/>
    <path d="M28 30 Q35 36 42 30" stroke="#3d2206" stroke-width="2" fill="none" stroke-linecap="round"/>
    <rect x="22" y="58" width="10" height="18" rx="5" fill="#8b6914"/><rect x="38" y="58" width="10" height="18" rx="5" fill="#8b6914"/>
  </svg>`;

  document.getElementById('modal-card').innerHTML = `
    <div class="cert-outer">
      <div class="cert-card">
        <div class="cert-dots"></div>
        <div class="cert-yoyo-wrap">${yoyoSvg}</div>
        <div class="cert-title">✦ ${card.title} ✦</div>
        <div class="cert-desc">${card.description}</div>
        ${factsHtml ? `<div class="cert-facts">${factsHtml}</div>` : ''}
        <div class="cert-funfact">
          <div class="cert-funfact-label">🌟 Did you know?</div>
          <div class="cert-funfact-text">${card.fun_fact}</div>
        </div>
        <div class="cert-bottom">
          <div class="cert-score-stars">${stars}</div>
          <div class="cert-meta-right">${card.levelDisplay}<br>${card.date}</div>
        </div>
      </div>
    </div>`;

  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal(e){
  if(e && e.target !== document.getElementById('modal-overlay') && e.type==='click') return;
  document.getElementById('modal-overlay').classList.remove('active');
}

// ── INIT ──
render();
</script>
</body>
</html>
