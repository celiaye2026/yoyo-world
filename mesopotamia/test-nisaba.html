<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nisaba API Test · v4 Step 1</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2em auto; padding: 0 1em; background: #fdf6e3; color: #2d1a06; }
  h1 { margin-bottom: .3em; }
  .note { color: #8a7a5c; font-size: .9em; margin-bottom: 1.5em; }
  .controls { display: flex; gap: .5em; margin-bottom: 1em; align-items: center; flex-wrap: wrap; }
  select, button, input { font-size: 1em; padding: .5em .8em; border-radius: 6px; border: 1px solid #c9b896; background: #fff; color: #2d1a06; }
  button { cursor: pointer; background: #ff85c0; color: #fff; border: none; }
  button:hover { background: #e96aa8; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  #chat { background: #fff; border: 1px solid #c9b896; border-radius: 8px; padding: 1em; min-height: 300px; max-height: 500px; overflow-y: auto; margin-bottom: 1em; }
  .msg { margin: .8em 0; padding: .6em .9em; border-radius: 12px; max-width: 85%; line-height: 1.5; }
  .msg.user { background: #e8f4ff; margin-left: auto; text-align: right; }
  .msg.nisaba { background: #fff5e6; border: 1px solid #f0d9a8; }
  .msg.nisaba::before { content: "✨ Nisaba: "; font-weight: bold; color: #c9a35a; }
  .msg.sys { background: #f0f0f0; font-size: .85em; color: #666; font-style: italic; text-align: center; }
  .input-row { display: flex; gap: .5em; }
  #input { flex: 1; }
  .err { color: #c33; background: #fee; padding: .5em; border-radius: 6px; margin: .5em 0; }
</style>
</head>
<body>

<h1>🏺 Nisaba API Test</h1>
<p class="note">v4 Step 1 验收页 — 仅供 Celia 测试 Nisaba 人设是否成立。不对外公开。</p>

<div class="controls">
  <label>Area:
    <select id="area">
      <option value="opening">opening (Yoyo 卧室)</option>
      <option value="area_1">area_1 (两河)</option>
      <option value="area_2">area_2 (泥砖)</option>
      <option value="area_3">area_3 (食物)</option>
      <option value="area_4">area_4 (文字)</option>
      <option value="area_5">area_5 (石门告别)</option>
    </select>
  </label>
  <button id="reset">🔄 Reset conversation</button>
</div>

<div id="chat">
  <div class="msg sys">选一个 area，然后输入一句话开始。换 area 会自动清空历史。</div>
</div>

<div class="input-row">
  <input id="input" type="text" placeholder="Type something to Nisaba (中文或 English)..." autofocus>
  <button id="send">Send</button>
</div>

<script>
const $ = id => document.getElementById(id);
const chat = $('chat'), input = $('input'), sendBtn = $('send'), areaSel = $('area'), resetBtn = $('reset');

let messages = [];
let currentArea = areaSel.value;

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addErr(text) {
  const div = document.createElement('div');
  div.className = 'err';
  div.textContent = '❌ ' + text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function resetChat(reason) {
  messages = [];
  chat.innerHTML = '';
  const note = document.createElement('div');
  note.className = 'msg sys';
  note.textContent = reason || `Reset · area = ${currentArea}`;
  chat.appendChild(note);
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  sendBtn.disabled = true;

  addMsg('user', text);
  messages.push({ role: 'user', content: text });

  try {
    const r = await fetch('/api/nisaba', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, area: currentArea })
    });
    const data = await r.json();
    if (!r.ok) {
      addErr(data.error || `HTTP ${r.status}`);
    } else {
      const reply = data.reply || '(empty reply)';
      addMsg('nisaba', reply);
      messages.push({ role: 'assistant', content: reply });
    }
  } catch (e) {
    addErr('Network error: ' + e.message);
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

sendBtn.addEventListener('click', send);
input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

areaSel.addEventListener('change', () => {
  currentArea = areaSel.value;
  resetChat(`Switched to ${currentArea} · history cleared`);
});

resetBtn.addEventListener('click', () => resetChat());
</script>

</body>
</html>
