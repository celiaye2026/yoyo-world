<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mesopotamia Quiz — Yoyo's World</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5e6c4;--gold:#F0C040;--sand:#D4A96A;--terra:#C1440E;--text:#F5ECD7;--dim:#A89070;--purple:#7B68EE;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#1a0d04;color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;}

/* ── LOADING ── */
#screen-loading{flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:40px 24px;text-align:center;}
.loading-icon{font-size:3.5rem;animation:spin 2s linear infinite;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.loading-title{font-family:'Cinzel',serif;color:var(--gold);font-size:1.4rem;}
.loading-sub{color:var(--dim);font-size:.9rem;}

/* ── QUIZ ── */
#screen-quiz{flex-direction:column;align-items:center;padding:0;background:linear-gradient(to bottom,#110904,#1e1005);}
.quiz-wrap{width:100%;max-width:560px;padding:20px 20px 60px;display:flex;flex-direction:column;gap:0;}

.quiz-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0 18px;}
.quiz-back{color:var(--dim);font-size:.85rem;text-decoration:none;transition:color .2s;}
.quiz-back:hover{color:var(--gold);}
.quiz-progress-wrap{flex:1;margin:0 16px;}
.quiz-progress-bar{height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--terra));border-radius:3px;transition:width .5s ease;}
.quiz-count{color:var(--dim);font-size:.78rem;text-align:right;margin-top:4px;}

.question-area{animation:fadeSlide .4s ease;}
@keyframes fadeSlide{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-icon{font-size:2.8rem;text-align:center;margin-bottom:12px;}
.q-label{color:var(--dim);font-size:.8rem;letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:10px;}
.q-text{font-family:'Cinzel',serif;color:var(--text);font-size:1.08rem;line-height:1.65;text-align:center;margin-bottom:28px;padding:0 4px;}

.options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.opt-btn{background:rgba(255,255,255,.05);border:2px solid rgba(212,169,106,.2);border-radius:14px;padding:14px 18px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.95rem;cursor:pointer;text-align:left;transition:background .2s,border-color .2s,transform .15s;line-height:1.45;}
.opt-btn:hover:not(:disabled){background:rgba(240,192,64,.1);border-color:rgba(240,192,64,.5);transform:translateX(4px);}
.opt-btn:disabled{cursor:default;}
.opt-btn.correct{background:rgba(60,180,80,.18);border-color:#3cb454;color:#a0f0b0;}
.opt-btn.wrong  {background:rgba(200,60,40,.18);border-color:#c83c28;color:#f0a0a0;}

.feedback-box{border-radius:14px;padding:14px 18px;margin-bottom:18px;font-size:.9rem;line-height:1.6;display:none;}
.feedback-box.correct{background:rgba(60,180,80,.12);border:1px solid rgba(60,180,80,.3);color:#b0f0c0;}
.feedback-box.wrong  {background:rgba(200,60,40,.12);border:1px solid rgba(200,60,40,.3);color:#f0b0a0;}
.feedback-icon{font-size:1.1rem;margin-right:6px;}

.next-timer{height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:2px;}
.next-timer-fill{height:100%;background:var(--gold);border-radius:2px;transition:width linear;}

/* ── RESULT ── */
#screen-result{flex-direction:column;align-items:center;padding:30px 20px 60px;background:linear-gradient(to bottom,#110904,#1e1005);}
.result-wrap{width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;gap:20px;}

/* Score < 3: encouragement */
.encourage-box{text-align:center;}
.encourage-icon{font-size:3rem;margin-bottom:12px;}
.encourage-title{font-family:'Cinzel',serif;color:var(--gold);font-size:1.4rem;margin-bottom:10px;}
.encourage-sub{color:var(--dim);font-size:.92rem;line-height:1.65;margin-bottom:24px;}

/* Score ≥ 3: certificate card */
.cert-card{
  width:100%;background:linear-gradient(145deg,#f5e6c4,#e8d5a0);
  border-radius:20px;padding:30px 26px;text-align:center;position:relative;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.6);
}
.cert-card::before{
  content:'';position:absolute;inset:3px;border-radius:17px;
  border:1.5px solid rgba(240,192,64,.6);pointer-events:none;
}
/* shimmer */
.cert-card::after{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
  animation:shimmer 3s ease-in-out infinite;pointer-events:none;
}
@keyframes shimmer{0%{left:-100%}60%,100%{left:150%}}

.cert-deco{color:#c8a020;font-size:.8rem;letter-spacing:4px;margin-bottom:14px;opacity:.7;}
.cert-yoyo{margin:0 auto 14px;}
.cert-title{font-family:'Cinzel',serif;color:#8a6010;font-size:1.25rem;font-weight:700;margin-bottom:14px;line-height:1.4;}
.cert-desc{color:#6a4a10;font-size:.9rem;line-height:1.7;font-style:italic;margin-bottom:18px;padding:0 4px;}
.cert-funfact{background:rgba(200,160,32,.15);border:1px solid rgba(200,160,32,.35);border-radius:12px;padding:12px 16px;margin-bottom:18px;text-align:left;}
.cert-funfact-label{color:#8a6010;font-size:.72rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
.cert-funfact-text{color:#5a3a08;font-size:.86rem;line-height:1.6;}
.cert-meta{color:#9a7030;font-size:.78rem;line-height:1.8;}

/* action buttons */
.result-actions{display:flex;flex-direction:column;gap:10px;width:100%;}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--terra));border:none;border-radius:50px;padding:13px 28px;color:white;font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;transition:transform .2s,opacity .2s;text-align:center;text-decoration:none;display:block;}
.btn-primary:hover{transform:translateY(-2px);}
.btn-outline{background:transparent;border:2px solid rgba(212,169,106,.35);border-radius:50px;padding:11px 24px;color:var(--dim);font-family:'Nunito',sans-serif;font-size:.9rem;cursor:pointer;transition:color .2s,border-color .2s;text-align:center;text-decoration:none;display:block;}
.btn-outline:hover{color:var(--gold);border-color:var(--gold);}
.btn-screenshot{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:50px;padding:9px 20px;color:var(--dim);font-family:'Nunito',sans-serif;font-size:.82rem;cursor:default;text-align:center;}

/* loading spinner for card fetch */
.card-loading{display:flex;flex-direction:column;align-items:center;gap:12px;padding:40px 0;}
.card-loading-dot{width:10px;height:10px;background:var(--gold);border-radius:50%;display:inline-block;animation:dotBounce .8s ease-in-out infinite;}
.card-loading-dot:nth-child(2){animation-delay:.15s;}
.card-loading-dot:nth-child(3){animation-delay:.3s;}
@keyframes dotBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
</style>
</head>
<body>

<!-- ══ LOADING ══ -->
<div id="screen-loading" class="screen active">
  <div class="loading-icon">⏳</div>
  <div class="loading-title">Preparing your challenge...</div>
  <div class="loading-sub">Yoyo's quiz is being crafted just for her 📜</div>
</div>

<!-- ══ QUIZ ══ -->
<div id="screen-quiz" class="screen">
  <div class="quiz-wrap">
    <div class="quiz-topbar">
      <a class="quiz-back" href="index.html">← Back</a>
      <div class="quiz-progress-wrap">
        <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="progress-fill" style="width:0%"></div></div>
        <div class="quiz-count" id="quiz-count">1 / 5</div>
      </div>
    </div>

    <div class="question-area" id="question-area">
      <div class="q-icon" id="q-icon">🏛️</div>
      <div class="q-label" id="q-label">Question 1 of 5</div>
      <p class="q-text" id="q-text"></p>
      <div class="options" id="options"></div>
      <div class="feedback-box" id="feedback-box"></div>
      <div class="next-timer"><div class="next-timer-fill" id="next-timer-fill" style="width:100%"></div></div>
    </div>
  </div>
</div>

<!-- ══ RESULT ══ -->
<div id="screen-result" class="screen">
  <div class="result-wrap" id="result-wrap"></div>
</div>

<script>
const Q_ICONS = ['🌍','☀️','🌱','🏛️','📜'];
const TOTAL = 5;
let questions = [];
let current = 0;
let score = 0;
let timerInterval = null;

// ── INIT ──
(async function init(){
  // Try cache first
  const cached = sessionStorage.getItem('mesoquiz_cache');
  if(cached){
    try{
      const parsed = JSON.parse(cached);
      if(parsed.questions && parsed.questions.length === TOTAL){
        questions = parsed.questions;
        startQuiz();
        return;
      }
    }catch(_){}
  }
  // Fetch from API
  try{
    const res = await fetch('/api/quiz', { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
    if(!res.ok) throw new Error('API error '+res.status);
    const data = await res.json();
    if(!data.questions || data.questions.length < TOTAL) throw new Error('Bad question data');
    questions = data.questions;
    sessionStorage.setItem('mesoquiz_cache', JSON.stringify(data));
    startQuiz();
  }catch(err){
    document.querySelector('#screen-loading .loading-icon').textContent = '😅';
    document.querySelector('#screen-loading .loading-title').textContent = 'Something went wrong...';
    document.querySelector('#screen-loading .loading-sub').textContent = err.message + ' — try refreshing the page.';
  }
})();

// ── START QUIZ ──
function startQuiz(){
  current = 0; score = 0;
  showScreen('quiz');
  renderQuestion();
}

// ── RENDER QUESTION ──
function renderQuestion(){
  const q = questions[current];
  const pct = (current / TOTAL) * 100;

  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('quiz-count').textContent = (current+1) + ' / ' + TOTAL;
  document.getElementById('q-icon').textContent = Q_ICONS[current] || '🏛️';
  document.getElementById('q-label').textContent = 'Question ' + (current+1) + ' of ' + TOTAL;
  document.getElementById('q-text').textContent = q.question;

  // Re-animate question area
  const area = document.getElementById('question-area');
  area.style.animation = 'none';
  void area.offsetWidth; // reflow
  area.style.animation = '';

  // Build options
  const optsEl = document.getElementById('options');
  optsEl.innerHTML = q.options.map((opt, i) =>
    `<button class="opt-btn" onclick="selectOption(${i})">${opt}</button>`
  ).join('');

  // Reset feedback + timer bar
  const fb = document.getElementById('feedback-box');
  fb.style.display = 'none'; fb.className = 'feedback-box';
  document.getElementById('next-timer-fill').style.transition = 'none';
  document.getElementById('next-timer-fill').style.width = '100%';
}

// ── SELECT OPTION ──
function selectOption(idx){
  if(timerInterval) return; // already answered
  const q = questions[current];
  const opts = document.querySelectorAll('.opt-btn');
  opts.forEach(b => b.disabled = true);

  const correctLetter = q.correct; // "A","B","C","D"
  const correctIdx = ['A','B','C','D'].indexOf(correctLetter);
  const isCorrect = (idx === correctIdx);
  if(isCorrect) score++;

  // Highlight
  opts[idx].classList.add(isCorrect ? 'correct' : 'wrong');
  if(!isCorrect && correctIdx >= 0) opts[correctIdx].classList.add('correct');

  // Feedback
  const fb = document.getElementById('feedback-box');
  fb.style.display = 'block';
  if(isCorrect){
    fb.className = 'feedback-box correct';
    fb.innerHTML = `<span class="feedback-icon">✅</span>${q.explanation}`;
  } else {
    fb.className = 'feedback-box wrong';
    fb.innerHTML = `<span class="feedback-icon">❌</span>The correct answer is <strong>${correctLetter}</strong>. ${q.explanation}`;
  }

  // Countdown timer bar (2.5s)
  const fill = document.getElementById('next-timer-fill');
  fill.style.transition = 'none'; fill.style.width = '100%';
  void fill.offsetWidth;
  fill.style.transition = 'width 2.5s linear'; fill.style.width = '0%';

  // Auto-advance
  timerInterval = setTimeout(()=>{
    timerInterval = null;
    current++;
    if(current >= TOTAL) showResult();
    else renderQuestion();
  }, 2500);
}

// ── RESULT ──
async function showResult(){
  showScreen('result');
  const wrap = document.getElementById('result-wrap');

  if(score < 3){
    wrap.innerHTML = `
      <div class="encourage-box">
        <div class="encourage-icon">💪</div>
        <div class="encourage-title">You scored ${score}/${TOTAL}</div>
        <p class="encourage-sub">No worries! Mesopotamia is a big topic. Go back and explore some more, then try again — you've got this!</p>
      </div>
      <div class="result-actions">
        <button class="btn-primary" onclick="retryQuiz()">Try Again ↺</button>
        <a class="btn-outline" href="index.html">← Back to Mesopotamia</a>
      </div>`;
    return;
  }

  // Score ≥ 3 — fetch certificate card
  if(score === 5){
    localStorage.setItem('yoyo_crossword_meso', 'true');
  }

  wrap.innerHTML = `<div class="card-loading">
    <div><span class="card-loading-dot"></span><span class="card-loading-dot"></span><span class="card-loading-dot"></span></div>
    <div style="color:var(--dim);font-size:.88rem">Creating your explorer card...</div>
  </div>`;

  let cardData;
  try{
    const res = await fetch('/api/card', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ score, level:'mesopotamia' })
    });
    if(!res.ok) throw new Error('API error');
    cardData = await res.json();
  }catch(_){
    cardData = {
      title: score === 5 ? 'Guardian of the Two Rivers' : 'Explorer of Mesopotamia',
      description: 'She walked the ancient banks where history first learned to write, and carried its lessons forward through time.',
      fun_fact: 'The Sumerians invented the wheel around 3500 BCE — not for chariots, but for pottery!'
    };
  }

  // Save to localStorage
  const cards = JSON.parse(localStorage.getItem('yoyo_cards') || '[]');
  cards.push({
    level: 'mesopotamia',
    levelDisplay: 'Mesopotamia · Level 1',
    title: cardData.title,
    description: cardData.description,
    fun_fact: cardData.fun_fact,
    score, total: TOTAL,
    date: new Date().toLocaleDateString('en-CA')
  });
  localStorage.setItem('yoyo_cards', JSON.stringify(cards));

  // Render certificate card
  const date = new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
  wrap.innerHTML = `
    <div class="cert-card">
      <div class="cert-deco">✦ ───────── ✦</div>
      <svg class="cert-yoyo" width="64" height="84" viewBox="0 0 70 92">
        <defs><clipPath id="sc2"><rect x="21" y="36" width="28" height="24" rx="8"/></clipPath></defs>
        <rect x="37" y="32" width="12" height="16" rx="3.5" fill="#7a3b10" opacity=".85"/>
        <rect x="21" y="36" width="28" height="24" rx="8" fill="#ff85c0"/>
        <g clip-path="url(#sc2)">
          <rect x="0" y="36" width="70" height="4" fill="#111"/>
          <rect x="0" y="44" width="70" height="4" fill="#111"/>
          <rect x="0" y="52" width="70" height="4" fill="#111"/>
        </g>
        <line x1="21" y1="40" x2="8" y2="52" stroke="#ff85c0" stroke-width="6" stroke-linecap="round"/>
        <line x1="49" y1="40" x2="62" y2="52" stroke="#ff85c0" stroke-width="6" stroke-linecap="round"/>
        <ellipse cx="15" cy="32" rx="8" ry="18" fill="#2d1a06"/>
        <ellipse cx="55" cy="32" rx="8" ry="18" fill="#2d1a06"/>
        <circle cx="35" cy="24" r="16" fill="#ffbe80"/>
        <path d="M19 19 L51 19 Q51 6 35 6 Q19 6 19 19Z" fill="#2d1a06"/>
        <rect x="23" y="21.5" width="9.5" height="7" rx="2" fill="none" stroke="#3a3a3a" stroke-width="1.8"/>
        <rect x="37" y="21.5" width="9.5" height="7" rx="2" fill="none" stroke="#3a3a3a" stroke-width="1.8"/>
        <line x1="32.5" y1="25" x2="37" y2="25" stroke="#3a3a3a" stroke-width="1.5"/>
        <line x1="23" y1="25" x2="19.5" y2="27" stroke="#3a3a3a" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="46.5" y1="25" x2="50" y2="27" stroke="#3a3a3a" stroke-width="1.4" stroke-linecap="round"/>
        <circle cx="27.75" cy="25" r="2.3" fill="#3d2206"/>
        <circle cx="41.75" cy="25" r="2.3" fill="#3d2206"/>
        <circle cx="28.8" cy="24" r="1" fill="white"/>
        <circle cx="42.8" cy="24" r="1" fill="white"/>
        <path d="M28 30 Q35 36 42 30" stroke="#3d2206" stroke-width="2" fill="none" stroke-linecap="round"/>
        <rect x="22" y="58" width="10" height="18" rx="5" fill="#8b6914"/>
        <rect x="38" y="58" width="10" height="18" rx="5" fill="#8b6914"/>
      </svg>
      <div class="cert-title">✦ ${cardData.title} ✦</div>
      <div class="cert-desc">${cardData.description}</div>
      <div class="cert-funfact">
        <div class="cert-funfact-label">🌟 Did you know?</div>
        <div class="cert-funfact-text">${cardData.fun_fact}</div>
      </div>
      <div class="cert-meta">Score: ${score}/${TOTAL} · Mesopotamia · Level 1<br>${date}</div>
      <div class="cert-deco" style="margin-top:16px;margin-bottom:0">✦ ───────── ✦</div>
    </div>

    <div class="result-actions">
      <div class="btn-screenshot">📸 Screenshot to save your card!</div>
      ${score === 5
        ? `<a class="btn-primary" href="../crossword/mesopotamia.html">Play Word Game 🎮</a>`
        : ''}
      <a class="btn-outline" href="../index.html">🌍 Back to World Map</a>
    </div>`;
}

// ── RETRY ──
function retryQuiz(){
  sessionStorage.removeItem('mesoquiz_cache');
  window.location.reload();
}

// ── SCREEN SWITCH ──
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}
</script>
</body>
</html>
